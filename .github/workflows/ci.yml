name: CI

on:
  push:
    branches: [main]
  pull_request:

# Every job below reports its own CI status so we can see at a glance which
# parts of the suite are healthy on a given commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint Lua code with luacheck. Fast, no DB or server required.
  # ---------------------------------------------------------------------------
  luacheck:
    name: Luacheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 + luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks

      - name: Install luacheck
        run: sudo luarocks install --lua-version=5.1 luacheck

      - name: Run luacheck
        run: luacheck .

  # ---------------------------------------------------------------------------
  # Unit tests for pure-Lua modules (no OpenResty / ngx runtime required).
  # Runs with busted. Good for models, validators, utilities, etc.
  # ---------------------------------------------------------------------------
  busted:
    name: Busted (Lua unit tests)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: snap-cloud-password
          POSTGRES_DB: snapcloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LAPIS_ENVIRONMENT: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USERNAME: cloud
      DATABASE_PASSWORD: snap-cloud-password
      DATABASE_NAME: snapcloud_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 + luarocks + postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks postgresql-client

      - name: Install busted + test dependencies
        run: |
          sudo luarocks install --lua-version=5.1 busted
          sudo luarocks install --lua-version=5.1 luacov

      - name: Load schema into snapcloud_test
        env:
          PGPASSWORD: snap-cloud-password
        run: |
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/schema.sql
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/seeds.sql

      - name: Run busted
        run: busted --config-file=.busted --verbose

  # ---------------------------------------------------------------------------
  # End-to-end browser tests with Playwright. Boots the app in a real
  # OpenResty/Lapis process against a throwaway postgres instance.
  # ---------------------------------------------------------------------------
  playwright:
    name: Playwright (e2e)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: snap-cloud-password
          POSTGRES_DB: snapcloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LAPIS_ENVIRONMENT: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USERNAME: cloud
      DATABASE_PASSWORD: snap-cloud-password
      DATABASE_NAME: snapcloud_test
      PORT: 8080
      HOSTNAME: localhost
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenResty, Lua, PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wget gnupg ca-certificates lsb-release \
            lua5.1 liblua5.1-0-dev luarocks postgresql-client
          wget -qO - https://openresty.org/package/pubkey.gpg \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/openresty.gpg
          codename=$(lsb_release -sc)
          echo "deb http://openresty.org/package/ubuntu $codename main" \
            | sudo tee /etc/apt/sources.list.d/openresty.list
          sudo apt-get update
          sudo apt-get install -y openresty

      - name: Install Lua dependencies
        run: sudo luarocks install --lua-version=5.1 --only-deps snapcloud-dev-0.rockspec

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps + Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build stylesheets
        run: npx sass static/scss/:static/style/compiled/ --style compressed --no-source-map

      - name: Load schema into snapcloud_test
        env:
          PGPASSWORD: snap-cloud-password
        run: |
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/schema.sql
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/seeds.sql

      - name: Start Lapis server
        run: |
          mkdir -p logs tmp store/test
          lapis server test &
          echo "Waiting for server to come up..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Server is up."
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests (excluding axe suite)
        run: npx playwright test --grep-invert "@axe"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Accessibility tests: separate job so the a11y status is a first-class
  # signal. Reuses the Playwright setup but only runs @axe-tagged specs.
  # ---------------------------------------------------------------------------
  axe:
    name: Axe-core (a11y)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: snap-cloud-password
          POSTGRES_DB: snapcloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LAPIS_ENVIRONMENT: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USERNAME: cloud
      DATABASE_PASSWORD: snap-cloud-password
      DATABASE_NAME: snapcloud_test
      PORT: 8080
      HOSTNAME: localhost
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenResty, Lua, PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wget gnupg ca-certificates lsb-release \
            lua5.1 liblua5.1-0-dev luarocks postgresql-client
          wget -qO - https://openresty.org/package/pubkey.gpg \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/openresty.gpg
          codename=$(lsb_release -sc)
          echo "deb http://openresty.org/package/ubuntu $codename main" \
            | sudo tee /etc/apt/sources.list.d/openresty.list
          sudo apt-get update
          sudo apt-get install -y openresty

      - name: Install Lua dependencies
        run: sudo luarocks install --lua-version=5.1 --only-deps snapcloud-dev-0.rockspec

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps + Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build stylesheets
        run: npx sass static/scss/:static/style/compiled/ --style compressed --no-source-map

      - name: Load schema into snapcloud_test
        env:
          PGPASSWORD: snap-cloud-password
        run: |
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/schema.sql
          psql -h 127.0.0.1 -U cloud -d snapcloud_test -f db/seeds.sql

      - name: Start Lapis server
        run: |
          mkdir -p logs tmp store/test
          lapis server test &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Server is up."
              break
            fi
            sleep 1
          done

      - name: Run axe-core accessibility tests
        run: npx playwright test --grep "@axe"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: playwright-report
          retention-days: 7
